<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="12" y1="6" x2="88" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#48b077"/>
      <stop offset="0.55" stop-color="#2c8055"/>
      <stop offset="1" stop-color="#164e30"/>
    </linearGradient>
    <radialGradient id="sheen" cx="30" cy="20" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="50" y1="20" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdfbf5"/>
      <stop offset="1" stop-color="#e7e0cd"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.3" stdDeviation="1.4" flood-color="#0c3a21" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- squircle body -->
  <rect x="3" y="3" width="94" height="94" rx="26" fill="url(#bg)"/>
  <!-- glossy top-left sheen -->
  <rect x="3" y="3" width="94" height="94" rx="26" fill="url(#sheen)"/>
  <!-- subtle bevel rim -->
  <rect x="4.2" y="4.2" width="91.6" height="91.6" rx="24.8" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.2"/>

  <!-- W mark: continuous strokes, inner A + crossbar, lifted off the surface -->
  <g fill="none" stroke="url(#ink)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#lift)">
    <path d="M15 24 L38 76 L50 45 L62 76 L85 24"/>
    <path d="M32 60 L69 60"/>
  </g>
</svg>
